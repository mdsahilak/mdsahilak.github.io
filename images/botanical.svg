    <!-- Between row 1 and 2 -->
    <path class="s" stroke-width="0.5" d="M0,95 Q50,88 100,92 Q150,96 200,90 Q250,84 300,90 Q350,96 400,90"/>
    <path class="s" stroke-width="0.3" d="M0,102 Q60,96 120,100 Q180,104 240,98 Q300,92 360,98 Q380,100 400,98"/>
    <!-- Between row 2 and 3 -->
    <path class="s" stroke-width="0.5" d="M0,165 Q50,158 100,162 Q150,166 200,160 Q250,154 300,160 Q350,166 400,160"/>
    <path class="s" stroke-width="0.3" d="M0,172 Q55,166 110,170 Q165,174 220,168 Q275,162 330,168 Q370,172 400,168"/>
    <!-- Between row 3 and 4 -->
    <path class="s" stroke-width="0.5" d="M0,245 Q50,238 100,242 Q150,246 200,240 Q250,234 300,240 Q350,246 400,240"/>
    <path class="s" stroke-width="0.3" d="M0,252 Q60,246 120,250 Q180,254 240,248 Q300,242 360,248 Q380,250 400,248"/>
