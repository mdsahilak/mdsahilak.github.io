    <!-- Tiny foam clusters -->
    <circle class="f" cx="30" cy="82" r="0.8"/>
    <circle class="f" cx="35" cy="85" r="0.5"/>
    <circle class="f" cx="180" cy="150" r="0.7"/>
    <circle class="f" cx="185" cy="153" r="0.5"/>
    <circle class="f" cx="60" cy="230" r="0.8"/>
    <circle class="f" cx="65" cy="233" r="0.5"/>
    <circle class="f" cx="250" cy="310" r="0.7"/>
    <circle class="f" cx="255" cy="313" r="0.5"/>
    <circle class="f" cx="350" cy="160" r="0.6"/>
    <circle class="f" cx="10" cy="320" r="0.7"/>
    <circle class="f" cx="380" cy="350" r="0.6"/>
    <circle class="f" cx="200" cy="230" r="0.7"/>
    <circle class="f" cx="320" cy="180" r="0.5"/>
    <circle class="f" cx="150" cy="280" r="0.6"/>
  </g>
</svg>
