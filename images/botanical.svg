    <path class="s" stroke-width="0.4" d="M85,368 Q110,364 140,368 Q170,372 200,368 Q230,364 260,368"/>
    <path class="s" stroke-width="0.3" d="M100,374 Q130,370 155,374 Q180,378 210,374"/>
