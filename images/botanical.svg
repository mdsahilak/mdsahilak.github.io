<svg width="400" height="400" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .s { fill: none; stroke: #5a7a4e; stroke-linecap: round; stroke-linejoin: round; }
      .f { fill: #5a7a4e; stroke: none; }
    </style>
  </defs>

  <!-- === ROW 1: Large crashing wave === -->
  <g opacity="0.10">
