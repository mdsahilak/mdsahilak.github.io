    <path class="s" stroke-width="0.4" d="M0,58 Q25,54 50,48 Q75,40 95,34"/>
    <path class="s" stroke-width="0.3" d="M10,62 Q35,58 55,52 Q78,44 100,38"/>
    <path class="s" stroke-width="0.3" d="M5,66 Q30,64 50,60 Q70,54 85,50"/>
    <path class="s" stroke-width="0.25" d="M20,70 Q40,68 55,64 Q70,60 82,56"/>
  </g>

  <!-- Foam / whitewash after row 1 -->
  <g opacity="0.05">
    <path class="s" stroke-width="0.5" d="M120,78 Q140,74 160,78 Q180,82 200,78"/>
    <path class="s" stroke-width="0.4" d="M140,82 Q160,78 180,82 Q200,86 215,82"/>
    <path class="s" stroke-width="0.3" d="M160,86 Q175,83 190,86 Q205,89 218,86"/>
