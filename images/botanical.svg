    <circle class="f" cx="135" cy="80" r="0.8" opacity="0.3"/>
    <circle class="f" cx="155" cy="84" r="0.6" opacity="0.25"/>
    <circle class="f" cx="175" cy="80" r="0.7" opacity="0.3"/>
