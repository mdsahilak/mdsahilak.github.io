    <path class="s" stroke-width="0.4" d="M120,68 Q130,62 140,64 Q148,68 142,72"/>
    <path class="s" stroke-width="0.4" d="M108,72 Q118,68 128,70 Q135,74 125,76"/>
    <path class="s" stroke-width="0.3" d="M130,58 Q138,54 144,56"/>
