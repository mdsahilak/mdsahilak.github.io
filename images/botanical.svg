  <g opacity="0.05">
    <path class="s" stroke-width="0.3" d="M0,368 Q20,364 40,358 Q60,350 78,344"/>
    <path class="s" stroke-width="0.25" d="M5,372 Q22,370 38,364 Q55,358 70,352"/>
