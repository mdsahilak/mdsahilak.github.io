    <path class="s" stroke-width="0.7" d="M155,20 Q160,22 158,30 Q154,36 148,35"/>
    <path class="s" stroke-width="0.5" d="M155,25 Q157,28 154,32"/>
    <!-- Spray droplets -->
    <circle class="f" cx="162" cy="10" r="1.2" opacity="0.4"/>
    <circle class="f" cx="168" cy="14" r="0.8" opacity="0.3"/>
    <circle class="f" cx="158" cy="8" r="0.9" opacity="0.35"/>
    <circle class="f" cx="165" cy="6" r="0.6" opacity="0.25"/>
    <circle class="f" cx="170" cy="18" r="0.7" opacity="0.3"/>
